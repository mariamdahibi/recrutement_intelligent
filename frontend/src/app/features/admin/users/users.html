<div class="users-page">

  <div class="page-header">

    <div>
      <span class="badge">Espace Admin</span>
      <h1>🛡️ Gestion des utilisateurs</h1>
      <p>Administration des candidats, recruteurs et administrateurs.</p>
    </div>

  </div>

  <div *ngIf="loading" class="loading-card">
    Loading users...
  </div>

  <div *ngIf="error && !loading" class="error-card">
    {{ error }}
  </div>

  <ng-container *ngIf="!loading">

    <section class="form-card">

      <h2>Ajouter un utilisateur</h2>

      <div class="form-grid">

        <input
          type="text"
          [(ngModel)]="newUser.name"
          placeholder="Nom"
        />

        <input
          type="email"
          [(ngModel)]="newUser.email"
          placeholder="Email"
        />

        <input
          type="password"
          [(ngModel)]="newUser.password"
          placeholder="Mot de passe"
        />

        <select [(ngModel)]="newUser.role">
          <option value="CANDIDATE">Candidat</option>
          <option value="RECRUITER">Recruteur</option>
          <option value="ADMIN">Admin</option>
        </select>

      </div>

      <button
        class="add-btn"
        (click)="addUser()"
      >
        Ajouter utilisateur
      </button>

    </section>

    <section class="users-grid">

      <article
        class="user-card"
        *ngFor="let user of users"
      >

        <div class="avatar">
          {{ user.name.charAt(0) }}
        </div>

        <div class="user-info">

          <h3>{{ user.name }}</h3>

          <p>{{ user.email }}</p>

          <span [ngClass]="getRoleClass(user.role)">
            {{ getRoleLabel(user.role) }}
          </span>

        </div>

        <button
          class="delete-btn"
          (click)="deleteUser(user.id)"
        >
          Supprimer
        </button>

      </article>

    </section>

  </ng-container>

</div>
